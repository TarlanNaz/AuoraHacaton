name: structurator
description: "Структуратор — оффлайн-первый помощник полевого сотрудника. Преобразует сырые заметки в структурированные отчёты через GigaChat."
publish_to: "none"
version: 1.0.0+2

environment:
  sdk: ">=3.3.0 <4.0.0"
  flutter: ">=3.19.0"

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.6
  http: ^1.2.1
  provider: ^6.1.2
  shared_preferences: ^2.2.3
  intl: ^0.20.2
  uuid: ^4.4.0
  flutter_dotenv: ^6.0.1
  image_picker: ^1.1.2
  path_provider: ^2.1.4
  path: ^1.9.0
  geolocator: ^14.0.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  integration_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  mocktail: ^1.0.4

flutter:
  uses-material-design: true
  assets:
    - .env
    - assets/images/
