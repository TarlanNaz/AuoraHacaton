org.gradle.jvmargs=-Xmx8G -XX:MaxMetaspaceSize=4G -XX:ReservedCodeCacheSize=512m -XX:+HeapDumpOnOutOfMemoryError
android.useAndroidX=true
# This newDsl flag was added by the Flutter template
android.newDsl=false
# This builtInKotlin flag was added by the Flutter template
android.builtInKotlin=false

# ─── Workaround: Pub-кэш на C:, проект на D: ───────────────────────────────
# Kotlin Incremental Compiler пытается посчитать relativeTo() между файлом
# плагина в C:\Users\...\Pub\Cache и проектом в D:\..., и падает с
# "this and base files have different roots". Отключаем инкрементальную
# компиляцию Kotlin — это лечит падение ценой небольшого замедления
# повторных сборок (на свежем clean-build разницы нет).
# Issue: https://youtrack.jetbrains.com/issue/KT-62686
kotlin.incremental=false
kotlin.incremental.useClasspathSnapshot=false
